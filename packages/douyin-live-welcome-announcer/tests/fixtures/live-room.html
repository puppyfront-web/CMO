<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Fixture Live Room</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.appendEntryMessage = function appendEntryMessage(text) {
        const line = document.createElement("div");
        line.className = "message-line";
        line.textContent = text;
        document.getElementById("app").appendChild(line);
      };
    </script>
  </body>
</html>
